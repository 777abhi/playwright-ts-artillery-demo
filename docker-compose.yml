version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - jaeger
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "4318:4318" # OTLP HTTP
      - "16686:16686" # UI
